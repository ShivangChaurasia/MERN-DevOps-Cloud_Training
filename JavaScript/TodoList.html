<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>DOM Todo-List</title>
</head>
<body class="bg-gradient-to-br from-blue-600 to-pink-400 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-white/90 backdrop-blur-sm p-6 rounded-2xl shadow-xl text-center">

        <h1 class="font-bold text-3xl md:text-4xl text-gray-800 mb-6">Todo-List</h1>

        <div class="flex flex-col sm:flex-row gap-2 mb-6">
            <input
                id="input"
                type="text"
                placeholder="Type to add..."
                class="flex-1 border border-gray-300 rounded-lg p-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white text-gray-900" 
                required
            >
            <button
                onClick="addItem()"
                class="bg-blue-600 hover:bg-blue-700 text-white font-medium px-5 py-2.5 rounded-lg transition-colors duration-200 cursor-pointer"
            >
                Add Task
            </button>
        </div>

        <div id="container" class="text-left space-y-2"></div>

    </div>

    <script src="TodoList.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Animated DOM Counter</title>
    <style>
        /* Smooth animation for when the number changes */
        .pop-anim {
            transition: transform 0.15s ease-out;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-cyan-900 via-blue-900 to-indigo-900 min-h-screen flex items-center justify-center p-6 font-sans antialiased text-gray-800">
    
    <div class="bg-white/10 backdrop-blur-xl rounded-3xl shadow-[0_20px_50px_rgba(0,0,0,0.3)] p-10 w-full max-w-sm border border-white/20 flex flex-col items-center">
        
        <h1 class="text-sm font-black tracking-[0.2em] text-cyan-300 uppercase mb-8 opacity-80">
            Interactive Counter
        </h1>
        
        <div class="flex items-center justify-center gap-8 bg-white/5 p-4 rounded-2xl shadow-inner border border-white/10">
            
            <button id="minus" title="Decrease" onclick="Minus()" 
                class="flex items-center justify-center w-14 h-14 bg-white/10 hover:bg-red-500/80 text-white rounded-xl shadow-lg transition-all duration-200 transform hover:-translate-y-1 hover:shadow-red-500/30 active:translate-y-1 active:scale-90 focus:outline-none cursor-pointer">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M20 12H4" />
                </svg>
            </button>
            
            <div id="value" class="pop-anim text-7xl font-extrabold text-transparent bg-clip-text bg-gradient-to-b from-white to-cyan-200 w-24 text-center tabular-nums drop-shadow-md">
                0
            </div>
            
            <button id="plus" title="Increase" onclick="plus()" 
                class="flex items-center justify-center w-14 h-14 bg-white/10 hover:bg-emerald-500/80 text-white rounded-xl shadow-lg transition-all duration-200 transform hover:-translate-y-1 hover:shadow-emerald-500/30 active:translate-y-1 active:scale-90 focus:outline-none cursor-pointer">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
                </svg>
            </button>
            
        </div>
    </div>

    <script>
        let value = document.getElementById('value');
        
        // Triggers the CSS scale animation
        function triggerPop() {
            value.style.transform = 'scale(1.2)';
            setTimeout(() => {
                value.style.transform = 'scale(1)';
            }, 150);
        }

        function Minus(){
            value.innerText--;
            triggerPop();
        }

        function plus(){
            value.innerText++;
            triggerPop();
        }
    </script>
</body>
</html>
